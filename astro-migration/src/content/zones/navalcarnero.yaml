longDescription: |
  <h2>Cerrajeros en Navalcarnero — Servicio 24 Horas</h2>
  <p><strong>Navalcarnero</strong> es un municipio histórico situado al suroeste de Villaviciosa del Odón, conocido por su tradición vinícola y su casco antiguo con edificios de gran valor arquitectónico. En los últimos años, Navalcarnero ha experimentado un importante crecimiento con <strong>nuevas urbanizaciones residenciales</strong> en la periferia del pueblo. Nuestros cerrajeros llegan a cualquier punto de Navalcarnero en <strong>15 a 20 minutos</strong>.</p>
  <p>La diversidad urbana de Navalcarnero plantea retos de cerrajería variados. En el <strong>casco histórico</strong> encontramos puertas de madera maciza con cerraduras antiguas de gorjas y llaves de paleta que requieren un manejo experto para su apertura sin daños. En las <strong>urbanizaciones nuevas</strong>, las viviendas cuentan con puertas blindadas o acorazadas con bombines de última generación. Nuestros cerrajeros están preparados para trabajar con ambos tipos de cerraduras, garantizando siempre una intervención limpia y profesional.</p>

  <h3>Servicios de cerrajería en Navalcarnero</h3>
  <ul>
    <li>Apertura de puertas antiguas en el casco histórico sin dañar la carpintería</li>
    <li>Cambio de cerraduras y bombines antibumping en urbanizaciones</li>
    <li>Modernización de cerraduras en edificios históricos</li>
    <li>Instalación de cerrojos y refuerzos de seguridad</li>
    <li>Cerrajería para locales comerciales del centro de Navalcarnero</li>
    <li>Apertura de puertas de garaje y trasteros</li>
  </ul>

  <p>Tanto si vives en el casco antiguo de Navalcarnero como en una de las urbanizaciones más recientes, nuestro equipo te ofrece un servicio de cerrajería de confianza con <strong>precios cerrados y sin sorpresas</strong>. Llama al <strong>692 19 29 90</strong> para asistencia urgente o para pedir presupuesto.</p>
faqs:
  - question: "¿Podéis abrir puertas antiguas en el casco histórico de Navalcarnero?"
    answer: "Sí, somos especialistas en cerraduras antiguas de gorjas y llaves de paleta. Abrimos sin dañar la puerta ni la carpintería original, respetando el patrimonio del edificio."
  - question: "¿Cuánto tardáis en llegar a Navalcarnero?"
    answer: "Entre 15 y 20 minutos a cualquier zona de Navalcarnero, tanto al casco urbano como a las urbanizaciones periféricas."
  - question: "¿Trabajáis con los comercios del centro de Navalcarnero?"
    answer: "Sí, ofrecemos cerrajería comercial para tiendas, bares y restaurantes del centro: persianas metálicas, cierres de seguridad, cambio de cerraduras y aperturas urgentes."
