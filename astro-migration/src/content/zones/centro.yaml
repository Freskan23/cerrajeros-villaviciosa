longDescription: |
  <h2>Cerrajeros en el Centro de Villaviciosa del Odón</h2>
  <p>El <strong>Centro de Villaviciosa del Odón</strong> es el corazón histórico del municipio, con una mezcla de edificios residenciales antiguos y modernos. Nuestros cerrajeros conocen perfectamente la zona y llegamos en <strong>15 minutos</strong> a cualquier calle del centro, desde la Plaza del Ayuntamiento hasta la Avenida de los Reyes Católicos.</p>
  <p>Los edificios antiguos del centro suelen tener cerraduras de <strong>gorjas o serreta</strong> que requieren conocimiento especializado para su apertura sin daños. También instalamos cerraduras modernas antibumping adaptadas a puertas de madera maciza y blindadas típicas de la zona.</p>
  <p>Atendemos urgencias de cerrajería las 24 horas del día, los 365 días del año. Llamar al <strong>915 27 00 49</strong> para asistencia inmediata.</p>
faqs:
  - question: "¿Cuánto tardáis en llegar al centro de Villaviciosa?"
    answer: "15 minutos de media. Tenemos cerrajeros de guardia permanente en la zona."
  - question: "¿Trabajáis con las cerraduras antiguas del centro?"
    answer: "Sí, somos especialistas en todo tipo de cerraduras, incluidas las de gorjas típicas de edificios antiguos."
