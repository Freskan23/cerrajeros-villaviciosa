  - question: "¿Cobráis extra por desplazaros a Alcorcón?"
    answer: "No, nuestras tarifas son las mismas sin recargos por desplazamiento. Presupuesto cerrado por teléfono."
  - question: "¿Abrís puertas de pisos antiguos en Alcorcón?"
    answer: "Sí, somos especialistas en cerraduras de gorjas y serreta habituales en los edificios más antiguos de Alcorcón. Apertura sin daños garantizada."
