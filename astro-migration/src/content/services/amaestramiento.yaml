faqs:
  - question: "¿Se puede amaestrar cualquier cerradura?"
    answer: "La mayoría de cerraduras modernas son amaestrables. Evaluamos cada caso sin compromiso."
  - question: "¿Cuánto tarda el proceso?"
    answer: "Depende del número de puertas. Una comunidad media se completa en 1-2 días."
  - question: "¿Es seguro el amaestramiento?"
    answer: "Sí. Cada llave individual sigue siendo única y las llaves maestras tienen tarjeta de propiedad incopiable."
