longDescription: |
  <h2>Cierres metálicos en Villaviciosa del Odón</h2>
  <p>Somos especialistas en <strong>instalación, reparación y mantenimiento de cierres metálicos</strong> para comercios, garajes y naves industriales en Villaviciosa del Odón. Atendemos urgencias 24 horas cuando tu persiana metálica se queda bloqueada.</p>
  <h3>Servicios de cierres metálicos</h3>
  <ul>
    <li><strong>Reparación urgente</strong>: Persianas atascadas, descarriladas o con motor averiado.</li>
    <li><strong>Instalación nueva</strong>: Cierres enrollables, de lamas o de ballesta.</li>
    <li><strong>Motorización</strong>: Automatización de persianas manuales existentes.</li>
    <li><strong>Refuerzo de seguridad</strong>: Cerraduras antirrobo y anclajes reforzados.</li>
  </ul>
  <p>Trabajamos con persianas de todos los tipos: <strong>enrollables, plegables, de lamas microperforadas y de seguridad reforzada</strong>. Servicio rápido para que tu negocio no pierda ni un día de actividad.</p>
