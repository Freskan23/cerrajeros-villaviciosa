longDescription: |
  <h2>Muelles cierrapuertas en Villaviciosa del Odón</h2>
  <p>Los <strong>muelles cierrapuertas</strong> son esenciales para comunidades de vecinos, oficinas y locales comerciales. Garantizan que las puertas se cierren de forma automática y controlada, mejorando la seguridad y el aislamiento térmico y acústico del edificio.</p>
  <h3>Tipos de cierrapuertas</h3>
  <ul>
    <li><strong>Hidráulicos de brazo</strong>: Los más comunes para portales y accesos.</li>
    <li><strong>De suelo</strong>: Integrados en el pavimento, estéticamente discretos.</li>
    <li><strong>Deslizantes</strong>: Para puertas correderas automáticas.</li>
    <li><strong>Retenedores magnéticos</strong>: Mantienen la puerta abierta y la liberan en caso de alarma.</li>
  </ul>
  <p>Instalamos, ajustamos y reparamos cierrapuertas de todas las marcas. El ajuste correcto es fundamental para evitar portazos, ruido excesivo y desgaste prematuro del mecanismo.</p>
