faqs:
  - question: "¿Hacéis desahucios sin orden judicial?"
    answer: "No. Solo actuamos con orden judicial vigente para garantizar la legalidad del procedimiento."
  - question: "¿Incluye el cambio de cerradura?"
    answer: "Sí, tras el desahucio realizamos el cambio de cerradura y entregamos las llaves nuevas al propietario."
  - question: "¿En qué zonas ofrecéis este servicio?"
    answer: "Villaviciosa del Odón y municipios limítrofes: Boadilla, Brunete, Móstoles, Alcorcón."
